<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Asyfaa ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cinematic Opening Curtain -->
    <div id="opening-cinematic" class="cinematic-overlay">
        <div class="flower-garden"></div>
        <div class="cinematic-core">
            <div class="elegant-seal">🌸</div>
            <h2 class="opening-title">A Special Present for Someone Special</h2>
            <p class="opening-hint">Nyalakan volume suara kamu ya...</p>
            <button id="startBtn" class="btn-premium">✨ Open the Story</button>
        </div>
    </div>

    <div class="stars"></div>

    <!-- Glow Background -->
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
    <div class="glow glow3"></div>
    <div class="glow glow4"></div>

    <!-- Hero Section -->
    <section id="hero" class="page hidden">
        <div class="peony">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
        </div>

        <h1>Untuk Pacarku Sayang ❤️</h1>
        <p class="subtitle">Seperti peony yang mekar perlahan, rasa sayangku tumbuh setiap hari.</p>

        <button id="openBtn">💌 Open My Heart</button>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="page hidden">
        <div class="card">
            <h2>Her Beautiful Pics 📸</h2>

            <div class="photos">
                <div class="photo-frame">
                    <img src="foto1.jpg" alt="Memori 1">
                </div>
                <div class="photo-frame">
                    <img src="foto2.jpg" alt="Memori 2">
                </div>
                <div class="photo-frame">
                    <img src="foto3.jpg" alt="Memori 3">
                </div>
            </div>

            <button id="loveBtn">Click Me ❤️</button>

            <div id="letter" class="letter">
                <h3>Untuk Asyfaa ❤️</h3>
                <p id="typed-text"></p>
            </div>

            <br>
            <button id="backBtn" class="btn-back">Back</button>
        </div>
    </section>

    <!-- Audio -->
    <audio id="music" loop>
        <source src="about-you.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
